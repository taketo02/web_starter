<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>web_starter ── 自己紹介ページ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1 id="name">
        <!-- ここを 書き換える: あなたの 名前 -->
        Student Name
      </h1>
      <p class="subtitle">情報工学科 3 年</p>
    </header>

    <section class="card">
      <h2>趣味</h2>
      <ul>
        <!-- ここを 書き換える: あなたの 趣味 -->
        <li>読書</li>
        <li>映画鑑賞</li>
        <li>散歩</li>
      </ul>
    </section>

    <section class="card">
      <h2>好きな こと</h2>
      <p>
        <!-- ここを 書き換える: 自由に -->
        新しい 技術を 触ること、 美味しい もの を 食べる こと。
      </p>
    </section>

    <section class="card">
      <h2>今日 の 気分</h2>
      <p id="mood">クリックで 変わります</p>
      <button id="moodBtn">気分を 変える</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
